name: Builds, tests & co

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set-up Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - run: corepack enable

      - name: Install deps
        run: pnpm i

      - name: Lint + Typings Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Type regression (React 18-19)
        run: pnpm test:type-regression

      - name: Examples build
        run: pnpm examples:build

      - name: Docs build
        run: pnpm docs:build

      - name: Tests (unit)
        run: pnpm test:coverage

      - name: Tests (examples snapshots)
        run: pnpm test:examples