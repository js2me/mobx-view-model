name: Builds, tests & co

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up Node.js
        uses: actions/setup-node@v4
        with:
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - run: corepack enable

      - name: Install deps
        run: pnpm i

      - name: Lint + Typings Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Next.js SSR example (production build)
        run: pnpm example:ssr:build:example

      - name: Docs build
        run: pnpm docs:build

      - name: Tests
        run: pnpm test:coverage