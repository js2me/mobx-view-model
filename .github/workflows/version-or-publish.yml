name: Version or Publish

on:
  workflow_run:
    workflows: ["Builds, tests & co"]
    types: [completed]

concurrency: ${{ github.workflow }}

permissions: read-all

jobs:
  release:
    if: ${{ github.event.workflow_run.head_branch == 'master' && github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write # to create release
      id-token: write # to generate provenance
      issues: write # to post issue comments
      pull-requests: write # to create pull request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set-up Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Enabling Corepack!
        run: corepack enable

      - name: Installing Deps
        run: pnpm i --frozen-lockfile

      - name: Building packages
        run: pnpm run build

      - run: npm install -g npm@latest

      - name: Create Release Pull Request Or Publish
        uses: changesets/action@v1
        continue-on-error: false
        id: pub-or-release-pr
        with:
          version: pnpm version-packages
          publish: pnpm exec sborshik ci
          createGithubReleases: false
        env:
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
