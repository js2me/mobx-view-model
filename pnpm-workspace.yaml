packages:
  - 'packages/*'
  - 'examples/*'
  - 'docs'
autoInstallPeers: false
linkWorkspacePackages: true
preferWorkspacePackages: true
shamefullyHoist: true
frozenLockfile: false
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lefthook: true
  sharp: false
minimumReleaseAgeExclude:
  - mobx-view-model-react@10.2.2
  - mobx-view-model@10.2.2
